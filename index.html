<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard | Patient Portal</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Header -->
        <header class="main-header">
            <div class="logo-area">
                <i class="fas fa-hospital-symbol logo-icon"></i>
                <div>
                    <h2>Hospital Management System</h2>
                    <p class="subtitle">Patient Records Management Portal</p>
                </div>
            </div>
            <div class="user-info">
                <span>Welcome, Administrator</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Form Section -->
            <aside class="form-section">
                <div class="form-card">
                    <div class="card-header">
                        <i class="fas fa-user-plus"></i>
                        <h3>Register New Patient</h3>
                    </div>
                    <form id="patientForm">
                        <div class="input-group">
                            <label for="name"><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="name" placeholder="E.g., Rajesh Kumar" required>
                        </div>
                        <div class="input-group">
                            <label for="age"><i class="fas fa-calendar-alt"></i> Age</label>
                            <input type="number" id="age" placeholder="E.g., 34" min="0" required>
                        </div>
                        <div class="input-group">
                            <label for="disease"><i class="fas fa-microscope"></i> Primary Diagnosis</label>
                            <input type="text" id="disease" placeholder="E.g., Seasonal Flu" required>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-save"></i> Save Patient Record
                        </button>
                    </form>
                </div>
            </aside>

            <!-- List Section -->
            <section class="list-section">
                <div class="table-card">
                    <div class="card-header">
                        <i class="fas fa-address-book"></i>
                        <h3>Active Patient Records</h3>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Patient Name</th>
                                    <th>Age</th>
                                    <th>Diagnosis</th>
                                    <th>Admission Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="patientTableBody">
                                <!-- Data will be loaded here dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
